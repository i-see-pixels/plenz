name: Version Bump

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Extract Release Type
        id: extract_type
        run: |
          # Check PR body first, then title
          PR_CONTENT="${{ github.event.pull_request.body }} ${{ github.event.pull_request.title }}"
          if echo "$PR_CONTENT" | grep -qi "RELEASE_TYPE: major"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$PR_CONTENT" | grep -qi "RELEASE_TYPE: minor"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$PR_CONTENT" | grep -qi "RELEASE_TYPE: patch"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "No RELEASE_TYPE found in PR description or title. Skipping version bump."
            exit 0
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Bump Version
        if: steps.extract_type.outputs.type != ''
        run: |
          node scripts/bump-version.mjs ${{ steps.extract_type.outputs.type }}

      - name: Commit and Tag
        if: steps.extract_type.outputs.type != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git push origin main
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
